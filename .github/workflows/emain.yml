name: Compilar ArlightCore

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compilar
        run: mvn --batch-mode clean package
      - uses: actions/upload-artifact@v4
        with:
          name: ArlightCore-1.5.0-CUSTOM-HOLOGRAMS
          path: target/ArlightCore-1.5.0.jar
          if-no-files-found: error
